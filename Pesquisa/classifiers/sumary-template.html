<html>
<head>
<meta charset="utf-8" />
<title>Summary of Results</title>
<style type="text/css">
tr td:nth-child(1) {
  font-weight: 700;
}
table {
    border-collapse: collapse;

}
thead tr td {
    border-bottom: 1px solid black;
}

tbody tr td {
    border-bottom: 1px solid gray;
}
.minimum {
    font-style: italic;
    text-decoration: underline;
    color:#0d38af;
}
.ensemble2 {
    background-color: #DDD;
}
.nomes {
    background-color: #f0f0f0;
    text-align: right;
}
.odd {
    background-color: #f9f9f9;
}
.even {
    background-color: #ffffff;
}
</style>
</head>
<body>  
{{TABLE_CONTENT}}
</body>

<script type="text/javascript">
    document.querySelectorAll("td").forEach(function(td) {
        if (td.textContent.endsWith("*")) {
            td.className = "minimum";
        }
    });

    // Destaca em negrito a coluna MAE2 quando seu valor é menor que MAE1
    const rows = document.querySelectorAll("tbody tr");
    rows.forEach(function(row) {
        const cells = row.querySelectorAll("td");
        if (cells.length >= 7) {
            // Coluna MAE1 é a 6ª (índice 5) e MAE2 é a 7ª (índice 6)
            const meanCell = cells[1];
            const mae1Cell = cells[5];
            const mae2Cell = cells[6];
            const time1Cell = cells[11];
            const time2Cell = cells[12];
            
            const meanValue = parseFloat(meanCell.textContent.trim());
            const mae1Value = parseFloat(mae1Cell.textContent.trim());
            const mae2Value = parseFloat(mae2Cell.textContent.trim());
            const time1Value = parseFloat(time1Cell.textContent.trim());
            const time2Value = parseFloat(time2Cell.textContent.trim());
            
            if (!isNaN(mae1Value) && !isNaN(mae2Value) && !isNaN(meanValue)) {
                if (meanValue < Math.min(mae1Value, mae2Value)) {
                    meanCell.style.fontWeight = "bold";
                } else if (mae2Value < mae1Value) {
                    mae2Cell.style.fontWeight = "bold";
                    mae2Cell.style.color = "#0d38af"; // Cor azul para destacar o melhor MAE
                } else if (mae1Value == mae2Value) {
                    mae2Cell.style.fontWeight = "bold";
                    mae1Cell.style.fontWeight = "bold";
                } else {
                    mae1Cell.style.fontWeight = "bold";
                }
            }
            if (!isNaN(time1Value) && !isNaN(time2Value)) {
                if (time2Value < time1Value) {
                    time2Cell.style.fontWeight = "bold";
                    time2Cell.style.color = "#0d38af"; // Cor azul para destacar o melhor tempo
                }  
            }
        }
    });
</script>
</html>
